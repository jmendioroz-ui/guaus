    <title>Guau</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        
        html, body {
            width: 100%;
            height: 100svh;           /* Mejor para iPhone */
            overflow: hidden;
            background: #d6661b;
        }

        .screen {
            position: fixed;
            inset: 0;
            height: 100svh;
            background: linear-gradient(to bottom, #ff9f1c, #d6661b);
            display: flex;
            flex-direction: column;
            padding: 45px 25px 35px;
        }

        .logo img {
            width: 170px;
            display: block;
            margin: 0 auto 15px;
        }

        .tagline {
            text-align: center;
            color: #222;
            font-size: 25px;
            line-height: 1.1;
            font-weight: 600;
            margin-bottom: 25px;
        }

        .dog-container {
            flex: 1;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            margin: 0 -25px;
        }

        .dog-container img {
            width: 100%;
            max-width: 460px;
            height: auto;
        }

        .bottom {
            margin-top: auto;
            text-align: center;
        }

        .btn-crear {
            background: white;
            color: #d6661b;
            border: none;
            padding: 17px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            max-width: 340px;
            margin: 0 auto 12px;
        }

        .btn-login {
            background: transparent;
            color: white;
            border: none;
            font-size: 17px;
        }
    </style>
</head>
